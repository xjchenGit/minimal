bio: |
  I am a Ph.D. student at [National Taiwan University (NTU)](https://www.ntu.edu.tw/english/), 
  advised by [Hung-yi Lee](https://speech.ee.ntu.edu.tw/~hylee/index.php) and 
  [Jyh-Shing Roger Jang](http://mirlab.org/jang/cv/cv.asp). 
  I received my M.S. from {{icon:ntu}} [NTU](https://www.ntu.edu.tw/english/) (2023) and B.S. from 
  {{icon:ntust}} [Taiwan Tech](https://www.ntust.edu.tw/index.php?Lang=en) (2020).
  My research focuses on Speech Processing, Speech/Text Large Language Models (LLMs), and Deepfake Detection.

intro: |  
  I lead Deepfake research by proposing [SingGraph](https://www.isca-archive.org/interspeech_2024/chen24o_interspeech.html) for SingFake detection, the development of [CodecFake+](https://arxiv.org/abs/2501.08238) to address data scarcity, and the pioneering of source tracing with [SASTNet](https://arxiv.org/abs/2506.07294).
  Beyond security, I am a core contributor to several audio LLM and benchmarking projects, including [DeSTA 2.5](https://arxiv.org/abs/2507.02768), [Dynamic-SUPERB](https://openreview.net/forum?id=s7lzZpAW7T), and [Codec-SUPERB](https://aclanthology.org/2024.findings-acl.616/). 
  I also mentor research on optimizing RAG efficiency for LLMs and uncovering their practical limitations.
  My work has been recognized through several best paper awards and travel grants (see [Honors](#honors)).