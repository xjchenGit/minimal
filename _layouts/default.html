<!doctype html>
<html>

<head>
	<meta charset="utf-8">
	<meta http-equiv="X-UA-Compatible" content="chrome=1">
	<title>{{ page.title_full | default: site.title }}</title>

	{% if page.description %}<meta name="description" content="{{ page.description }}">{% endif %}

	<meta property="og:title" content="{{ page.title_full | default: site.title }}">
	<meta property="og:description" content="{{ page.description | default: site.description }}">
	<meta property="og:image" content="{{ page.og_image | default: 'https://xjchengit.github.io/minimal/assets/img/xj_4x3.jpg' }}">
	<meta property="og:url" content="{{ page.og_url | default: site.url }}">
	<meta property="og:type" content="{{ page.og_type | default: 'profile' }}">

	<link rel="stylesheet" href="assets/css/styles.css?v=10">
	<link rel="stylesheet" href="assets/css/header.css?v=10">
	<link rel="stylesheet" href="assets/css/logo.css">
	<link rel="stylesheet" href="assets/css/pubs.css?v=48">
	<link rel="stylesheet" href="assets/css/pygment_trac.css">
	{% for css in page.extra_css %}<link rel="stylesheet" href="{{ css }}">
	{% endfor %}
	<meta name="viewport" content="width=device-width, initial-scale=1" />

	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:wght@300;400;600;700&family=Noto+Serif+TC:wght@400;500;600&family=EB+Garamond:wght@400;500;600;700&display=swap"
		rel="stylesheet">
	<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" rel="stylesheet">
	<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/jpswalsh/academicons@1/css/academicons.min.css">

	{{ page.head_extra }}
</head>

<body>
	<div class="wrapper">
		{% include header.html %}

		<section>
			{{ content }}
			<br>
			<script type='text/javascript' id='clustrmaps' async
				src='https://cdn.clustrmaps.com/map_v2.js?cl=cee3f2&w=200&t=tt&d=nEmSewDPXqNGs14be_z5YYcQJ2bmdcQr14eiveUCbnA&co=ffffff&cmn=005fa3&ct=2d78ad&cmo=980000'></script>
		</section>
	</div>
	<script src="assets/js/load_header.js?v=9" defer></script>
</body>

</html>
