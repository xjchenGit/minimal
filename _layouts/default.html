<!doctype html>
<html>

<head>
	<meta charset="utf-8">
	<meta http-equiv="X-UA-Compatible" content="chrome=1">
	<script>
		if ('scrollRestoration' in history) history.scrollRestoration = 'manual';
		if (location.hash) history.replaceState(null, '', location.pathname + location.search);
	</script>
	<title>{{ page.title_full | default: site.title }}</title>

	{% if page.description %}<meta name="description" content="{{ page.description }}">{% endif %}

	<meta property="og:title" content="{{ page.title_full | default: site.title }}">
	<meta property="og:description" content="{{ page.description | default: site.description }}">
	<meta property="og:image" content="{{ page.og_image | default: 'https://xjchen.tech/assets/img/xj_casual.jpg' }}">
	<meta property="og:url" content="{{ page.og_url | default: site.url }}">
	{% if page.og_url %}<link rel="canonical" href="{{ page.og_url }}">{% endif %}
	<meta property="og:type" content="{{ page.og_type | default: 'profile' }}">

	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link rel="preconnect" href="https://cdnjs.cloudflare.com" crossorigin>
	<link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
	<link href="https://fonts.googleapis.com/css?family=EB+Garamond:400,500&display=swap" rel="stylesheet">
	<link rel="stylesheet" href="assets/css/styles.css?v=26">
	<link rel="stylesheet" href="assets/css/header.css?v=23">
	<link rel="stylesheet" href="assets/css/logo.css?v=2">
	<link rel="stylesheet" href="assets/css/pubs.css?v=99">
	<link rel="stylesheet" href="assets/css/pygment_trac.css">
	{% for css in page.extra_css %}<link rel="stylesheet" href="{{ css }}">
	{% endfor %}
	<meta name="viewport" content="width=device-width, initial-scale=1" />

	<!-- Icon fonts: render-blocking-deferred via media-swap. Only used for
	     the BibTeX copy button (fa-copy) and optional hidden social icons,
	     so they don't need to block first paint. -->
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" media="print" onload="this.media='all'">
	<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/jpswalsh/academicons@1/css/academicons.min.css" media="print" onload="this.media='all'">
	<noscript>
		<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
		<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/jpswalsh/academicons@1/css/academicons.min.css">
	</noscript>

	{{ page.head_extra }}
</head>

<body class="page-{{ page.page_id | default: 'unknown' }}">
	<div class="wrapper">
		{% include header.html %}

		<section>
			{{ content }}
			<!-- ClustrMaps widget disabled 2026-06-13: cdn.clustrmaps.com has been
			     DNS SERVFAIL (no NS/SOA via 8.8.8.8 or 1.1.1.1) since 2026-06-03, so
			     the service is dead. Commented out rather than deleted — re-enable or
			     swap if it ever comes back.
			<div class="site-map-block">
				<script type='text/javascript' id='clustrmaps' async
					src='https://cdn.clustrmaps.com/map_v2.js?cl=cee3f2&w=200&t=tt&d=nEmSewDPXqNGs14be_z5YYcQJ2bmdcQr14eiveUCbnA&co=fbfbfd&cmn=005fa3&ct=2d78ad&cmo=980000'></script>
			</div>
			-->
			<footer class="site-footer">
				<p class="footer-updated">&copy; Xuanjun Chen, Last updated {{ site.time | date: "%B %Y" }}</p>
			</footer>
		</section>
	</div>
	<script src="assets/js/load_header.js?v=10" defer></script>
</body>

</html>
